<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
    <button id="newBookButton">Add New Book</button>
    <dialog id="dialogInterface">
        <form method="dialog" id="form">
            <h3>ADD BOOK INFO</h3>
            <div>
                <label for="title">Add Title</label>
                <input type="text" name="titleInput" id="titleInput" required placeholder="title...">
            </div>
            <div>
                <label for="author">Add Author</label>
                <input type="text" name="authorInput" id="authorInput" required placeholder="ram...">
            </div>
            <div>
                <label for="info">topic</label>
                <input type="text" name="infoInput" id="infoInput" required placeholder="about book...">
            </div>
            <div id="buttonsDiv">
                <button type="submit" id="submitBtn">submit</button>
                <button type="reset" id="resetBtn">reset</button>
                <button type="button" id="closeBtn">Cancel</button>
            </div>
        </form>
    </dialog>
    <div id="box">
        <div id="title"></div>
        <div id="author"></div>
        <div id="info"></div>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
